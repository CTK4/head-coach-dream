openapi: 3.1.0
info:
  title: Head Coach Dream Save API
  version: 1.0.0
servers:
  - url: http://localhost:8787
paths:
  /api/v1/health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/saves/metadata:
    get:
      summary: List save metadata
      operationId: listSaveMetadata
      responses:
        '200':
          description: Save metadata list
          content:
            application/json:
              schema:
                type: object
                required: [saves]
                properties:
                  saves:
                    type: array
                    items:
                      $ref: '#/components/schemas/SaveMetadata'
  /api/v1/saves/snapshots:
    post:
      summary: Create a save snapshot
      operationId: createSaveSnapshot
      parameters:
        - $ref: '#/components/parameters/OperationIdHeader'
        - $ref: '#/components/parameters/SequenceNumberHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSnapshotRequest'
      responses:
        '201':
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/saves/{saveId}/snapshot:
    get:
      summary: Get a save snapshot
      operationId: getSaveSnapshot
      parameters:
        - $ref: '#/components/parameters/SaveId'
      responses:
        '200':
          description: Snapshot found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveSnapshotResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Upsert a save snapshot
      operationId: upsertSaveSnapshot
      parameters:
        - $ref: '#/components/parameters/SaveId'
        - $ref: '#/components/parameters/OperationIdHeader'
        - $ref: '#/components/parameters/SequenceNumberHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertSnapshotRequest'
      responses:
        '200':
          description: Snapshot saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationResponse'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      summary: Delete a save snapshot
      operationId: deleteSaveSnapshot
      parameters:
        - $ref: '#/components/parameters/SaveId'
        - $ref: '#/components/parameters/OperationIdHeader'
        - $ref: '#/components/parameters/SequenceNumberHeader'
      responses:
        '204':
          description: Snapshot deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
components:
  parameters:
    SaveId:
      name: saveId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    OperationIdHeader:
      name: x-operation-id
      in: header
      required: true
      schema:
        type: string
        minLength: 1
      description: Unique client-generated operation ID used for idempotent retries.
    SequenceNumberHeader:
      name: x-sequence-number
      in: header
      required: true
      schema:
        type: integer
        minimum: 1
      description: Monotonic sequence per save stream; must be previous + 1.
  responses:
    Conflict:
      description: Operation replay or sequence conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConflictError'
    NotFound:
      description: Resource was not found
      content:
        application/json:
          schema:
            type: object
            required: [error]
            properties:
              error:
                type: string
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    SaveMetadata:
      type: object
      required:
        [saveId, coachName, teamName, season, week, record, updatedAt, lastPlayed, careerStage, version]
      properties:
        saveId:
          type: string
        coachName:
          type: string
        teamName:
          type: string
        season:
          type: number
        week:
          type: number
        record:
          type: object
          required: [wins, losses]
          properties:
            wins:
              type: number
            losses:
              type: number
        updatedAt:
          type: number
        lastPlayed:
          type: number
        careerStage:
          type: string
        version:
          type: number
    SaveState:
      type: object
      additionalProperties: true
      description: Existing game save/state object shape from the web app save schema.
    SaveSnapshotResponse:
      type: object
      required: [saveId, metadata, state]
      properties:
        saveId:
          type: string
        metadata:
          $ref: '#/components/schemas/SaveMetadata'
        state:
          $ref: '#/components/schemas/SaveState'
    MutationResponse:
      allOf:
        - $ref: '#/components/schemas/SaveSnapshotResponse'
        - type: object
          required: [operationId, sequence]
          properties:
            operationId:
              type: string
            sequence:
              type: integer
    ConflictError:
      type: object
      required: [error]
      properties:
        error:
          type: string
        expectedSequence:
          type: integer
        actualSequence:
          type: integer
    CreateSnapshotRequest:
      type: object
      required: [state]
      properties:
        saveId:
          type: string
        state:
          $ref: '#/components/schemas/SaveState'
    UpsertSnapshotRequest:
      type: object
      required: [state]
      properties:
        state:
          $ref: '#/components/schemas/SaveState'
